name = "cliff"
description = "A terminal-native directory for CLIs and TUIs. Browse, read READMEs, install in one keystroke."
author = "jmcntsh"
homepage = "https://github.com/jmcntsh/cliff"
readme = "https://raw.githubusercontent.com/jmcntsh/cliff/main/README.md"
tags = ["directory", "discovery", "installer", "tui"]
license = "MIT"
category = "Developer tools"
language = "Go"

[[installs]]
type = "brew"
package = "jmcntsh/tap/cliff"

[[installs]]
type = "script"
command = "curl -fsSL https://cliff.sh | sh"

# Prefer `cliff self-uninstall` (v0.1.19+) — the binary reads
# ~/.cliff/install.json (written by install.sh) to find its exact
# install location, refuses on brew/Cellar paths, and cleans ~/.cliff
# in one step. Older clients fall back to the path-list rm; the list
# now includes /opt/homebrew/bin/cliff, which install.sh has always
# been able to write to but the previous uninstall recipe missed.
[uninstall]
command = '''
if command -v cliff >/dev/null 2>&1 && cliff help 2>&1 | grep -q self-uninstall; then
  cliff self-uninstall
else
  rm -f "${CLIFF_INSTALL_DIR:+$CLIFF_INSTALL_DIR/cliff}" /usr/local/bin/cliff /opt/homebrew/bin/cliff "$HOME/.local/bin/cliff"
fi
'''
