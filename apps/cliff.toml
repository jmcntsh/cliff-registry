name = "cliff"
description = "A terminal-native directory for CLIs and TUIs. Browse, read READMEs, install in one keystroke."
author = "jmcntsh"
homepage = "https://github.com/jmcntsh/cliff"
readme = "https://raw.githubusercontent.com/jmcntsh/cliff/main/README.md"
tags = ["directory", "discovery", "installer", "tui"]
license = "MIT"
category = "Developer tools"
language = "Go"

[[installs]]
type = "brew"
package = "jmcntsh/tap/cliff"

[[installs]]
type = "script"
command = "curl -fsSL https://cliff.sh | sh"

# install.sh drops the binary in one of CLIFF_INSTALL_DIR, /usr/local/bin,
# or ~/.local/bin — try all three so the uninstall catches whichever the
# install picked without needing the user to remember. The ${VAR:+...}
# form expands to "$CLIFF_INSTALL_DIR/cliff" only when the var is set,
# else empty (and `rm -f ""` is harmless).
[uninstall]
command = 'rm -f "${CLIFF_INSTALL_DIR:+$CLIFF_INSTALL_DIR/cliff}" /usr/local/bin/cliff "$HOME/.local/bin/cliff"'
