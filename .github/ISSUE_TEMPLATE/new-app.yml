# Server side of the `cliff submit` / `+` flow in the cliff client.
# Field `id:` keys below must match the query-param names the client
# uses in internal/submit/submit.go (`name`, `repo`, `description`,
# `notes`); renaming one without the other silently stops prefilling
# that field. Keep them in sync.

name: Submit an app
description: Nominate a CLI or TUI for the cliff catalog.
title: "Submit: <app name>"
labels: ["submission"]
body:
  - type: markdown
    attributes:
      value: |
        Submit with minimum details now, then enrich later.

        Cliff supports two listing states:
        - `provisional`: basic listing from repo metadata
        - `verified`: listing with validated `.reel` details

        Every submission is reviewed. Missing optional details do not
        block a provisional listing.

  - type: input
    id: name
    attributes:
      label: Name / slug
      description: Optional. Lowercase with hyphens, e.g. `lazygit`.
      placeholder: lazygit

  - type: input
    id: repo
    attributes:
      label: GitHub repo
      description: "`owner/name`, or a full URL is fine too."
      placeholder: jesseduffield/lazygit
    validations:
      required: true

  - type: input
    id: description
    attributes:
      label: One-line description
      description: Optional. What does it do? One line, <=120 chars.
      placeholder: Simple terminal UI for git commands

  - type: dropdown
    id: install_type
    attributes:
      label: Install type
      description: Optional. How does it install on an average Mac/Linux box?
      options:
        - not provided
        - brew
        - cargo
        - npm
        - pipx
        - go
        - script
        - not sure

  - type: input
    id: install_string
    attributes:
      label: Install package or command
      description: |
        For brew/cargo/npm/pipx: the package name.
        For go: `github.com/.../cmd/foo@latest`.
        For script: the full curl-pipe-sh command.
      placeholder: "e.g. lazygit   or   github.com/x/y/cmd/z@latest"

  - type: input
    id: reel
    attributes:
      label: .reel file or PR link
      description: Optional now. Add later to promote to verified.
      placeholder: https://github.com/<owner>/<repo>/blob/main/<path>/<tool>.reel

  - type: textarea
    id: notes
    attributes:
      label: Anything else?
      description: |
        Why should cliff list this? Anything unusual about building
        or installing it? Links to demos, screenshots, blog posts,
        etc. are all welcome.
      placeholder: (optional)
