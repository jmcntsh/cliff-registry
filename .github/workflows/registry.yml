name: registry

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - run: go vet ./...
      - run: go test ./...
      - run: go run ./cmd/lint ./apps
      # Reel guardrails: block path leaks and missing disclaimers before
      # publishing. Cheap (json grep, stdlib-only), runs after manifest
      # lint so reel issues only surface when manifests are sane.
      - run: python3 scripts/lint-reels.py

  publish:
    needs: lint
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # cmd/build reads git history to stamp added_at
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Build index.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_SHA: ${{ github.sha }}
        run: |
          mkdir -p public public/reels
          go run ./cmd/build ./apps ./public/index.json
          cp CNAME public/CNAME 2>/dev/null || true
          # Publish reels next to index.json. Cliff fetches them by slug
          # at https://registry.cliff.sh/reels/<slug>.reel — only the .reel
          # artifacts ship, not the demo.sh sources, since cliff only ever
          # plays them.
          cp reels/*.reel public/reels/ 2>/dev/null || true
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: public
      - id: deployment
        uses: actions/deploy-pages@v4
