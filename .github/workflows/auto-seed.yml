name: auto-seed

on:
  schedule:
    - cron: "0 14 * * 1"
  workflow_dispatch:
    inputs:
      max_new:
        description: "Cap on emitted manifests"
        default: "20"
        type: string
      dry_run:
        description: "Print only; touch nothing"
        default: "false"
        type: choice
        options: ["false", "true"]

permissions:
  contents: write

concurrency:
  group: auto-seed
  cancel-in-progress: false

jobs:
  seed:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MAX_NEW: ${{ inputs.max_new || '20' }}
          DRY_RUN: ${{ inputs.dry_run || 'false' }}
        run: |
          extra=""
          if [ "$DRY_RUN" = "true" ]; then extra="--dry-run"; fi
          python3 scripts/seed.py --max-new "$MAX_NEW" --commit $extra
